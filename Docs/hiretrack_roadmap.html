<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HireTrack-Project</title>
  </head>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap");

    :root {
      --font-sans:
        "Plus Jakarta Sans", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f7f8fc;
      --color-background-tertiary: #eef1ff;
      --color-text-primary: #1d2333;
      --color-text-secondary: #3b445b;
      --color-text-tertiary: #677089;
      --color-border-secondary: #d8def0;
      --color-border-tertiary: #e6e9f5;
      --border-radius-md: 12px;
      --border-radius-lg: 18px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: 18px;
      line-height: 1.55;
      color: var(--color-text-primary);
      background:
        radial-gradient(circle at 15% 10%, #e8edff 0%, transparent 42%),
        radial-gradient(circle at 80% 0%, #efe8ff 0%, transparent 36%),
        linear-gradient(160deg, #f6f8ff 0%, #f3fff9 100%);
      min-height: 100vh;
    }

    .root {
      width: min(1120px, 94vw);
      margin: 2.25rem auto;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(39, 54, 102, 0.12);
      padding: 1.5rem;
    }

    .page-title {
      font-size: clamp(1.8rem, 1.35rem + 1.2vw, 2.5rem);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #1e2440;
      margin-bottom: 0.55rem;
    }

    .page-subtitle {
      font-size: 1rem;
      color: var(--color-text-secondary);
      margin-bottom: 1.15rem;
    }

    .nav {
      display: flex;
      gap: 8px;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .ntab {
      padding: 10px 14px;
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--color-background-primary);
      color: var(--color-text-secondary);
      transition: all 0.18s ease;
      box-shadow: 0 2px 8px rgba(32, 45, 92, 0.05);
    }

    .ntab:hover {
      background: var(--color-background-tertiary);
      transform: translateY(-1px);
    }

    .ntab.on {
      color: #eeedfe;
      border-color: transparent;
      box-shadow: 0 10px 18px rgba(53, 42, 128, 0.2);
    }

    .card {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.35rem;
      margin-bottom: 10px;
      box-shadow: 0 10px 24px rgba(44, 64, 110, 0.08);
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .phase-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-title {
      font-size: 0.74rem;
      font-weight: 700;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      margin-top: 1rem;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.98rem;
      color: var(--color-text-secondary);
      padding: 10px 12px;
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      border-left: 4px solid rgba(99, 56, 6, 0.18);
    }

    .task-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 9px;
    }

    .concept-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      font-size: 0.78rem;
      padding: 5px 10px;
      border-radius: 20px;
      font-weight: 700;
    }

    .tree {
      font-family: var(--font-mono);
      font-size: 0.84rem;
      line-height: 1.9;
      color: var(--color-text-secondary);
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      padding: 1rem;
      border: 1px dashed #d8def0;
    }

    .tree .dir {
      color: var(--color-text-primary);
      font-weight: 700;
    }

    .tree .file {
      color: var(--color-text-secondary);
    }

    .tree .ann {
      color: var(--color-text-tertiary);
      font-size: 0.75rem;
    }

    .erd-wrap {
      overflow-x: auto;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .ask-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 11px;
      border: 1px solid var(--color-border-secondary);
      border-radius: var(--border-radius-md);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.18s ease;
    }

    .ask-btn:hover {
      background: var(--color-background-tertiary);
      transform: translateY(-1px);
    }

    .time-chip {
      font-size: 0.76rem;
      color: var(--color-text-tertiary);
      border: 1px solid var(--color-border-tertiary);
      padding: 4px 9px;
      border-radius: 20px;
    }

    .schema-table {
      width: 100%;
      font-size: 0.82rem;
      border-collapse: collapse;
    }

    .schema-table th {
      text-align: left;
      font-weight: 700;
      font-size: 0.72rem;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 8px;
      border-bottom: 1px solid var(--color-border-tertiary);
    }

    .schema-table td {
      padding: 6px 8px;
      color: var(--color-text-secondary);
      border-bottom: 1px solid var(--color-border-tertiary);
    }

    .schema-table tr:last-child td {
      border-bottom: none;
    }

    .pk {
      color: #0f6e56;
      font-weight: 700;
    }

    .fk {
      color: #185fa5;
    }

    .type {
      color: var(--color-text-tertiary);
    }

    .flow-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .flow-box {
      font-size: 0.78rem;
      padding: 6px 11px;
      border-radius: 20px;
      font-weight: 700;
    }

    .arrow-txt {
      font-size: 1rem;
      color: var(--color-text-tertiary);
    }

    @media (max-width: 720px) {
      .root {
        margin: 1rem auto;
        padding: 1rem;
      }

      .task {
        font-size: 0.92rem;
      }
    }
  </style>

│   ├── email/
│   │   ├── index.ts            ← Resend/Nodemailer client
│   │   └── templates/
│   │       ├── interviewReminder.tsx
│   │       └── weeklyDigest.tsx
│   ├── validations/
│   │   ├── job.schema.ts
│   │   ├── application.schema.ts
│   │   └── auth.schema.ts
│   └── utils/
│       ├── rateLimit.ts        ← Redis sliding window
│       └── cache.ts            ← cache helpers
│
├── components/
│   ├── kanban/
│   ├── forms/
│   └── ui/
│
├── middleware.ts               ← route protection
├── worker.ts                   ← separate process: node worker.ts
└── drizzle.config.ts`;

      let active = 0;
      function renderNav() {
        document.getElementById("nav").innerHTML = PHASES.map(
          (p) =>
            `<button class="ntab ${p.id === active ? "on" : ""}" style="${p.id === active ? `background:${p.color};border-color:${p.color}` : ""}" onclick="go(${p.id})">${p.label}: ${p.name}</button>`,
        ).join("");
      }
      function renderContent() {
        const p = PHASES[active];
        let html = `<div class="card">
    <div class="phase-header">
      <span class="phase-badge" style="background:${p.badgeBg};color:${p.badgeColor}">${p.label}</span>
      <span style="font-size:16px;font-weight:500;color:var(--color-text-primary)">${p.name}</span>
      ${p.weeks ? `<span class="time-chip">${p.weeks}</span>` : ""}
    </div>
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px">${p.desc}</p>`;

        if (p.folder) {
          html += `<pre class="tree">${FOLDER.split("\n")
            .map((line) => {
              if (line.includes("←"))
                return line.replace(/(←.*)/, '<span class="ann">$1</span>');
              if (line.match(/\/$/) || line.match(/\/\s*$/))
                return `<span class="dir">${line}</span>`;
              return `<span class="file">${line}</span>`;
            })
            .join("\n")}</pre>`;
          html += `<button class="ask-btn" onclick="sendPrompt('Explain the lib/queue/worker.ts setup — how do I run BullMQ workers as a separate process alongside Next.js, and how do I restart them in production?')">How do I run the BullMQ worker as a separate process? ↗</button>`;
          html += `</div>`;
          document.getElementById("content").innerHTML = html;
          return;
        }

        if (p.schema) {
          html += `<div class="two-col">`;
          SCHEMA_TABLES.forEach((t) => {
            html += `<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px;font-family:var(--font-mono)">${t.name}</div>
      <table class="schema-table"><thead><tr><th>column</th><th>type / notes</th></tr></thead><tbody>`;
            t.cols.forEach((c) => {
              const nc =
                c.k === "pk"
                  ? `<span class="pk">${c.n}</span>`
                  : c.k === "fk"
                    ? `<span class="fk">${c.n}</span>`
                    : `<span>${c.n}</span>`;
              html += `<tr><td>${nc}</td><td class="type">${c.t}</td></tr>`;
            });
            html += `</tbody></table></div>`;
          });
          html += `</div>`;
          html += `<div style="margin-top:12px;font-size:12px;color:var(--color-text-tertiary);display:flex;gap:16px">
      <span><span class="pk" style="font-family:var(--font-mono)">green</span> = primary key</span>
      <span><span class="fk" style="font-family:var(--font-mono)">blue</span> = foreign key</span>
    </div>`;
          html += `<button class="ask-btn" style="margin-top:1rem" onclick="sendPrompt('Write the complete Drizzle ORM schema.ts file for HireTrack with all these tables: users, companies, jobs, applications, audit_logs, interviews, email_logs — with proper TypeScript types and relations')">Generate the Drizzle schema.ts file ↗</button>`;
          html += `</div>`;
          document.getElementById("content").innerHTML = html;
          return;
        }

        if (p.tasks) {
          html += `<div class="section-title">tasks to build</div>
    <ul class="task-list">`;
          p.tasks.forEach((t) => {
            html += `<li class="task"><span class="task-dot" style="background:${p.dot}"></span>${t}</li>`;
          });
          html += `</ul>`;
        }

        if (p.flow) {
          html += `<div class="section-title">pipeline state machine</div>
    <div class="flow-row">`;
          p.flow.forEach((s, i) => {
            html += `<span class="flow-box" style="background:${p.badgeBg};color:${p.badgeColor}">${s}</span>`;
            if (i < p.flow.length - 1)
              html += `<span class="arrow-txt">→</span>`;
          });
          html += `</div>`;
        }

        if (p.concepts) {
          html += `<div class="section-title">backend concepts you'll learn here</div>
    <div class="concept-row">`;
          p.concepts.forEach((c) => {
            html += `<span class="badge" style="background:${c.color};color:${c.tc}">${c.label}</span>`;
          });
          html += `</div>`;
        }

        if (p.tables) {
          html += `<div class="section-title">new db tables</div>
    <div class="concept-row">`;
          p.tables.forEach((t) => {
            html += `<code style="font-size:12px;padding:3px 8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);color:var(--color-text-secondary)">${t}</code>`;
          });
          html += `</div>`;
        }

        if (p.ask) {
          html += `<button class="ask-btn" onclick="sendPrompt('${p.ask.replace(/'/g, "\\'")}')">Deep-dive: ${p.ask.substring(0, 60)}... ↗</button>`;
        }
        html += `</div>`;
        document.getElementById("content").innerHTML = html;
      }
      function go(i) {
        active = i;
        renderNav();
        renderContent();
      }
      renderNav();
      renderContent();
    </script>
  </body>
</html>
